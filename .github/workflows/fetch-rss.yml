name: Fetch RSS articles

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
      timezone: "Asia/Tokyo"
permissions:
  contents: read

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch RSS
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/fetch_rss_batch.py --max-items-per-feed 12
